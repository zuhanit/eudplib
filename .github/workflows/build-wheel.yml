name: Build wheel

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build epscript libraries"]
    types: [completed]

jobs:
  build-wheel:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: eudplib-wheel-linux
          - os: windows-latest
            artifact-name: eudplib-wheel-windows
          - os: macos-latest
            artifact-name: eudplib-wheel-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libbz2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bzip2

      - name: Build wheel
        run: uv build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*.whl
